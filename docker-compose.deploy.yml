services:
  app:
    image: ${APP_IMAGE}
    container_name: minicloud-app
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_NAME: tasks
      DB_USER: admin
      DB_PASSWORD: admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - db
      - redis
    expose:
      - "5000"
    networks:
      - minicloud-net

  db:
    image: postgres:14
    container_name: minicloud-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tasks
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d tasks"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minicloud-net

  redis:
    image: redis:7
    container_name: minicloud-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - minicloud-net

  nginx:
    image: nginx:latest
    container_name: minicloud-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./cert.pem:/etc/nginx/certs/cert.pem:ro
      - ./key.pem:/etc/nginx/certs/key.pem:ro
    networks:
      - minicloud-net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: minicloud-cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
    networks:
      - minicloud-net

volumes:
  db-data:

networks:
  minicloud-net:
    driver: bridge